name: Background Training

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    defaults:
      run:
        working-directory: Chess

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resume training if checkpoint exists
        run: |
          if [ -f checkpoints/chess_net_final.pt ]; then
            python Train.py --device cpu --sims 15 --games 1 --iters 200 --resume checkpoints/chess_net_final.pt
          else
            python Train.py --device cpu --sims 15 --games 1 --iters 200
          fi

      - name: Commit updated checkpoint
        run: |
          git config user.name "training-bot"
          git config user.email "bot@users.noreply.github.com"
          git add checkpoints/
          git commit -m "Checkpoint update $(date -u)" || echo "nothing to commit"
          git push
